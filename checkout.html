<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>KABE-E | Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Hanken+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff", "primary-container": "#1a2a44", "tertiary": "#211200",
                        "surface-bright": "#fbf9f4", "on-error-container": "#93000a", "on-secondary-container": "#fffbff",
                        "outline-variant": "#c5c6ce", "error": "#ba1a1a", "on-surface-variant": "#44474d",
                        "on-error": "#ffffff", "surface-container-highest": "#e4e2de", "on-surface": "#1b1c19",
                        "on-tertiary": "#ffffff", "primary": "#04152e", "surface-dim": "#dbdad5",
                        "error-container": "#ffdad6", "outline": "#75777e", "background": "#fbf9f4",
                        "secondary-container": "#df2842", "surface-variant": "#e4e2de", "surface-container-low": "#f5f3ee",
                        "surface-container-high": "#eae8e3", "on-primary-container": "#8291b1", "surface-container": "#f0eee9",
                        "surface-container-lowest": "#ffffff", "on-primary": "#ffffff", "surface": "#fbf9f4",
                        "on-background": "#1b1c19", "inverse-surface": "#30312e", "on-tertiary-container": "#a88c68",
                        "tertiary-container": "#39260a", "combo-gold": "#b08d2f", "success": "#2f6b3a", "secondary": "#ba002c"
                    },
                    "borderRadius": { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                    "spacing": { "margin-mobile": "20px", "unit": "8px", "gutter": "24px", "margin-desktop": "64px", "container-max": "1000px" },
                    "fontFamily": {
                        "display-lg-mobile": ["Playfair Display"], "body-lg": ["Hanken Grotesk"], "label-sm": ["Hanken Grotesk"],
                        "display-lg": ["Playfair Display"], "body-md": ["Hanken Grotesk"], "headline-md": ["Playfair Display"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .washi-texture { background-color: #fbf9f4; background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png"); }
        input, select { background: #ffffff; border: 1px solid #c5c6ce; border-radius: 0.5rem; padding: 12px 14px; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #04152e; box-shadow: 0 0 0 2px rgba(4,21,46,0.1); }
        label.field-label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #44474d; display:block; margin-bottom: 6px; }
        .payment-opt.active { border-color: #04152e; background: rgba(4,21,46,0.05); }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md washi-texture min-h-screen">

<header class="bg-surface/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10 shadow-sm flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4">
<a class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight" href="kabe-e-homepage.html">KABE-E</a>
<a href="cart.html" class="text-on-surface-variant hover:text-primary transition-colors font-label-sm text-label-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Cart
</a>
</header>

<main class="max-w-[1000px] mx-auto px-margin-mobile md:px-margin-desktop py-10">

<!-- Checkout Form State -->
<div id="checkoutState">
  <h1 class="font-headline-md text-display-lg-mobile md:text-display-lg text-primary mb-10">Checkout</h1>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
    <form id="checkoutForm" class="lg:col-span-2 flex flex-col gap-8">
      <section>
        <h3 class="font-headline-md text-headline-md font-bold text-primary mb-4">Delivery Address</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="field-label">Full Name</label>
            <input type="text" id="fName" required>
          </div>
          <div>
            <label class="field-label">Phone Number</label>
            <input type="tel" id="fPhone" required pattern="[0-9]{10}" placeholder="10-digit mobile">
          </div>
          <div>
            <label class="field-label">Email (optional)</label>
            <input type="email" id="fEmail">
          </div>
          <div class="sm:col-span-2">
            <label class="field-label">Address</label>
            <input type="text" id="fAddress" required placeholder="House no., street, area">
          </div>
          <div>
            <label class="field-label">City</label>
            <input type="text" id="fCity" required>
          </div>
          <div>
            <label class="field-label">State</label>
            <input type="text" id="fState" required>
          </div>
          <div>
            <label class="field-label">Pincode</label>
            <input type="text" id="fPincode" required pattern="[0-9]{6}" placeholder="6-digit pincode">
          </div>
        </div>
      </section>

      <section>
        <h3 class="font-headline-md text-headline-md font-bold text-primary mb-4">Payment Method</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <button type="button" data-method="cod" class="payment-opt active border-2 border-outline-variant rounded-xl p-5 text-left transition-all">
            <span class="material-symbols-outlined text-primary mb-2 block">payments</span>
            <span class="font-bold block">Cash on Delivery</span>
            <span class="text-xs text-on-surface-variant">Pay when your order arrives</span>
          </button>
          <button type="button" disabled class="border-2 border-outline-variant/50 rounded-xl p-5 text-left opacity-50 cursor-not-allowed">
            <span class="material-symbols-outlined text-outline-variant mb-2 block">credit_card</span>
            <span class="font-bold block">Online Payment</span>
            <span class="text-xs text-on-surface-variant">Coming soon</span>
          </button>
        </div>
      </section>

      <button type="submit" id="placeOrderBtn" class="bg-primary text-on-primary font-bold py-5 rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
        <span class="material-symbols-outlined">lock</span> Place Order
      </button>
    </form>

    <div class="lg:col-span-1">
      <div class="border border-outline-variant/30 rounded-2xl p-6 bg-surface-container-lowest sticky top-24">
        <h3 class="font-headline-md text-headline-md font-bold text-primary mb-6">Order Summary</h3>
        <div id="orderItemsSummary" class="flex flex-col gap-3 mb-6 max-h-64 overflow-y-auto"></div>
        <div class="h-px bg-outline-variant/30 my-4"></div>
        <div class="flex justify-between text-sm mb-2">
          <span class="text-on-surface-variant">Subtotal</span>
          <span id="checkoutSubtotal" class="font-bold">₹0</span>
        </div>
        <div class="flex justify-between text-sm mb-4">
          <span class="text-on-surface-variant">Shipping</span>
          <span class="font-bold text-success">Free</span>
        </div>
        <div class="h-px bg-outline-variant/30 my-4"></div>
        <div class="flex justify-between text-lg">
          <span class="font-bold text-primary">Total</span>
          <span id="checkoutTotal" class="font-bold text-secondary">₹0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Confirmation State -->
<div id="confirmState" class="hidden text-center py-20 max-w-lg mx-auto">
  <span class="material-symbols-outlined text-[64px] text-success mb-6 block">check_circle</span>
  <h1 class="font-headline-md text-display-lg-mobile md:text-display-lg text-primary mb-4">Order Placed!</h1>
  <p class="text-on-surface-variant mb-2">Your order <span id="confirmOrderId" class="font-bold text-primary"></span> has been confirmed.</p>
  <p class="text-on-surface-variant mb-8">We'll get your pieces printed and packed carefully — pay on delivery when it arrives.</p>
  <a href="kabe-e-homepage.html" class="inline-block bg-primary text-on-primary font-bold px-8 py-4 rounded-full">Continue Shopping</a>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://ziqmvzxpvzuratzyreoh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_QvMLK7aKmXU07TWJwS3DAA_fcV1S22R';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const FALLBACK_IMG = 'data:image/svg+xml;charset=UTF-8,%3Csvg width="80" height="80" xmlns="http://www.w3.org/2000/svg"%3E%3Crect width="100%25" height="100%25" fill="%23e4e2de"/%3E%3C/svg%3E';

  async function ensureSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) return session.user.id;
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { console.error('Anonymous sign-in failed', error); return null; }
    return data.user.id;
  }

  function money(n) { return '₹' + n.toLocaleString('en-IN'); }

  let userId = null;
  let items = [];
  let selectedPaymentMethod = 'cod';

  document.querySelectorAll('.payment-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.payment-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPaymentMethod = btn.dataset.method;
    });
  });

  async function loadSummary() {
    userId = await ensureSession();
    if (!userId) return;
    const { data, error } = await sb.from('cart_items').select('*').eq('user_id', userId);
    if (error || !data || data.length === 0) {
      document.getElementById('checkoutState').innerHTML = `
        <div class="text-center py-20">
          <p class="text-on-surface-variant mb-6">Your cart is empty — nothing to check out.</p>
          <a href="kabe-e-homepage.html" class="inline-block bg-primary text-on-primary font-bold px-8 py-3 rounded-full">Go Shopping</a>
        </div>`;
      return;
    }
    items = data;
    const summaryEl = document.getElementById('orderItemsSummary');
    summaryEl.innerHTML = items.map(i => `
      <div class="flex gap-3 items-center">
        <div class="w-12 h-14 rounded overflow-hidden shrink-0 bg-surface-container-high">
          <img src="${i.image_snapshot || FALLBACK_IMG}" onerror="this.src='${FALLBACK_IMG}'" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold truncate">${i.title_snapshot}</p>
          <p class="text-xs text-on-surface-variant">Qty ${i.quantity} · ${i.format}</p>
        </div>
        <span class="text-sm font-bold">${money(i.unit_price * i.quantity)}</span>
      </div>
    `).join('');
    const subtotal = items.reduce((s, i) => s + i.unit_price * i.quantity, 0);
    document.getElementById('checkoutSubtotal').textContent = money(subtotal);
    document.getElementById('checkoutTotal').textContent = money(subtotal);
  }

  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('placeOrderBtn');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined">hourglass_top</span> Placing order...';

    try {
      const subtotal = items.reduce((s, i) => s + i.unit_price * i.quantity, 0);

      const { data: orderData, error: orderError } = await sb.from('orders').insert({
        user_id: userId,
        customer_name: document.getElementById('fName').value.trim(),
        phone: document.getElementById('fPhone').value.trim(),
        email: document.getElementById('fEmail').value.trim() || null,
        address_line: document.getElementById('fAddress').value.trim(),
        city: document.getElementById('fCity').value.trim(),
        state: document.getElementById('fState').value.trim(),
        pincode: document.getElementById('fPincode').value.trim(),
        payment_method: selectedPaymentMethod,
        status: 'pending',
        subtotal: subtotal,
        shipping_fee: 0,
        total: subtotal
      }).select().single();

      if (orderError) throw orderError;

      const orderItemsPayload = items.map(i => ({
        order_id: orderData.id,
        poster_id: i.poster_id,
        title_snapshot: i.title_snapshot,
        image_snapshot: i.image_snapshot,
        format: i.format,
        size_label: i.size_label,
        unit_price: i.unit_price,
        quantity: i.quantity
      }));

      const { error: itemsError } = await sb.from('order_items').insert(orderItemsPayload);
      if (itemsError) throw itemsError;

      await sb.from('cart_items').delete().eq('user_id', userId);

      document.getElementById('checkoutState').classList.add('hidden');
      document.getElementById('confirmState').classList.remove('hidden');
      document.getElementById('confirmOrderId').textContent = '#KE-' + orderData.id;
    } catch (err) {
      console.error(err);
      alert('Could not place order: ' + (err.message || err));
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  loadSummary();
</script>
</body></html>
